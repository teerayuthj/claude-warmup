name: Claude Code Warmup

on:
  schedule:
    # GitHub Actions delays average 45-68 min; trigger at 03:45 ICT
    # so the job finishes before 05:00 ICT even with worst-case delay.
    - cron: '45 3 * * *'
      timezone: 'Asia/Bangkok'
  workflow_dispatch: {}

jobs:
  warmup:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Ping Claude to anchor 5-hour window
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_OAUTH_TOKEN }}
        run: |
          mkdir -p ~/.claude
          echo '{"hasCompletedOnboarding":true}' > ~/.claude.json
          claude -p "hi" --model haiku --no-session-persistence 2>&1 || true
          echo "✓ Warmup complete"

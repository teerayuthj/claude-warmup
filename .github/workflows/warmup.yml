name: Claude Code Warmup

on:
  schedule:
    # GitHub scheduled runs can be delayed, so trigger a bit earlier than the
    # desired 05:50 ICT warmup time.
    - cron: '15 5 * * 1-5'
      timezone: 'Asia/Bangkok'
  workflow_dispatch: {}

jobs:
  warmup:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Ping Claude to anchor 5-hour window
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_OAUTH_TOKEN }}
        run: |
          mkdir -p ~/.claude
          echo '{"hasCompletedOnboarding":true}' > ~/.claude.json
          claude -p "hi" --model haiku --no-session-persistence 2>&1 || true
          echo "✓ Warmup complete"
